    "When I'm too busy or my routine gets disrupted, I am someone who",
    "When I'm away from home or traveling, I am someone who",
    "When my body isn't feeling its best, I am someone who",
    "When I don't have access to my usual place or equipment to be active, I am someone who",
    "When life gets in the way and being active feels out of reach, I am someone who",
    "On days when rest is what I truly need, I am someone who"
]

